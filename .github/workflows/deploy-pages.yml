name: Deploy inspection-logs to GitHub Pages

# Publishes the static app in inspection-logs/ to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "inspection-logs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: inspection-logs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
