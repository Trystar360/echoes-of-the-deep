name: Build

# Compiles the mod on every push and pull request so a broken build can't land
# unnoticed — releases (release.yml) were previously the only time CI ran Gradle.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build
        run: |
          chmod +x ./gradlew
          # gradle.properties pins a dev-box JDK path; point the toolchain at the
          # runner's JDK 25 (set by setup-java) instead.
          ./gradlew build --no-daemon -Porg.gradle.java.installations.paths="$JAVA_HOME"

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: echoes-of-the-deep
          path: |
            build/libs/echoes-of-the-deep-*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
