name: Release

# Builds the mod and publishes a GitHub Release with the jar attached, whenever a
# version tag (v*) is pushed. Run it by tagging a commit:
#   git tag v0.1.0 && git push origin v0.1.0
# or trigger manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to create and publish (e.g. v0.1.0)'
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build
        run: |
          chmod +x ./gradlew
          # gradle.properties pins a dev-box JDK path; point the toolchain at the
          # runner's JDK 25 (set by setup-java) instead.
          ./gradlew build --no-daemon -Porg.gradle.java.installations.paths="$JAVA_HOME"

      - name: List artifacts
        run: ls -la build/libs

      # GitHub Release — always runs. Creates the tag if it doesn't exist yet.
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Octaves of the One ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            build/libs/echoes-of-the-deep-*.jar
            !build/libs/*-sources.jar
          body: |
            **Octaves of the One** — a Fabric tech mod for Minecraft **26.1.2**, themed on
            Walter Russell's two-way universe of rhythmic balanced interchange.

            This release ports the whole mod to **Minecraft 26.1.2** — the first unobfuscated
            Minecraft, on Mojang official mappings (Yarn dropped), Fabric Loader `0.19.3`,
            Fabric API `0.152.1+26.1.2`, **Java 25**. The build is green and the dedicated
            server boots cleanly; every screen has been visually verified.

            **Install:** drop the jar into `.minecraft/mods/` with **Fabric Loader** (≥ 0.19.0)
            and **Fabric API** for **26.1** (Java 25).

            A complete, survival-craftable energy + logistics + transmutation loop, with an
            in-game Great Work advancement tree to guide it. Wiki:
            https://trystar360.github.io/echoes-of-the-deep/

            _The guided showcase world will return once it is rebuilt for 26.1._

      # Modrinth — only runs once a MODRINTH_ID variable + MODRINTH_TOKEN secret are set in
      # repo Settings (gated so an unconfigured repo doesn't fail the release). Mirrors the
      # same jar to Modrinth on every tagged release.
      - name: Publish to Modrinth
        if: ${{ vars.MODRINTH_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          version: ${{ inputs.tag || github.ref_name }}
          version-type: release
          files: |
            build/libs/echoes-of-the-deep-*.jar
            !build/libs/*-sources.jar
          loaders: fabric
          game-versions: '26.1.2'
          java: '25'
          dependencies: |
            fabric-api(required)
          github-token: ''
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
