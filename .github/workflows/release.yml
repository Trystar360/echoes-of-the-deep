name: Release

# Builds the mod and publishes a GitHub Release with the jar attached, whenever a
# version tag (v*) is pushed. Run it by tagging a commit:
#   git tag v0.1.0 && git push origin v0.1.0
# or trigger manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to create and publish (e.g. v0.1.0)'
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

      - name: List artifacts
        run: ls -la build/libs

      # Publishes to GitHub Releases and (when configured) Modrinth + CurseForge in one
      # step. Any platform whose token/id is missing is skipped automatically, so this
      # works out of the box for GitHub and lights up Modrinth the moment a MODRINTH_TOKEN
      # secret + MODRINTH_ID variable are added in the repo settings.
      - name: Publish release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Octaves of the One ${{ inputs.tag || github.ref_name }}
          version: ${{ inputs.tag || github.ref_name }}
          version-type: release
          files: |
            build/libs/echoes-of-the-deep-*.jar
            !build/libs/*-sources.jar

          loaders: fabric
          game-versions: '1.21.4'
          java: '21'
          dependencies: |
            fabric-api(required)

          # GitHub Release (creates the tag if it doesn't exist yet)
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ inputs.tag || github.ref_name }}
          github-generate-changelog: true

          # Modrinth — skipped unless both are set in repo Settings → Secrets/Variables
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          changelog: |
            **Octaves of the One** — a Fabric tech mod for Minecraft 1.21.4, themed on
            Walter Russell's two-way universe of rhythmic balanced interchange.

            A complete, survival-craftable energy + logistics + transmutation loop:
            generate Light, carry and bank it on a wired grid, broadcast it wirelessly,
            and spend it on machines, flight, and a personal matter-transmutation economy.
            The in-game Great Work advancement tree guides the whole progression.

            Install: drop the jar into .minecraft/mods/ with Fabric Loader (>= 0.16.0) and
            Fabric API for 1.21.4 (Java 21). Wiki:
            https://trystar360.github.io/echoes-of-the-deep/
